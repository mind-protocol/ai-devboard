# =============================================================================
# SUBTYPE SUMMARY — Every cluster has a unique identity
# =============================================================================

subtype_registry:
  issue:            { node_type: Moment,    source: "issue tracker",      role: "bug report or feature request with valence + friction" }
  error_log:        { node_type: Moment,    source: "monitoring",         role: "runtime error with stack trace (episodic, high friction)" }
  linter_bot:       { node_type: Actor,     source: "CI/CD",              role: "automated linting actor that creates error_logs" }
  review_comment:   { node_type: Moment,    source: "PR review",          role: "code review feedback event with reviewer trust" }
  migration:        { node_type: Narrative, source: "migration files",    role: "schema change procedure with destructive potential" }
  config:           { node_type: Thing,     source: "config files",       role: "configuration artifact (.env, .yaml) with high permanence" }
  secret:           { node_type: Thing,     source: "secrets management", role: "protected credential with extreme trust + aversion constraints" }
  doc_chain_link:   { node_type: "(link)",  source: "doc chain structure", role: "CHAIN_NEXT link — the golden thread between doc positions" }
  task:             { node_type: Narrative, source: "task management",    role: "work item with energy mapped to status lifecycle" }
  metric:           { node_type: Thing,     source: "metrics pipeline",   role: "observable measurement with recency-based energy" }

# =============================================================================
# LINK TYPE SUMMARY — How these clusters connect
# =============================================================================

link_type_registry:
  AFFECTS:       "issue identifies affected code files"
  EVIDENCES:     "error_log provides stack trace evidence for a code_function"
  SUPPORTS:      "error_log supports (is evidence for) an issue"
  CREATED:       "linter_bot created an error_log finding"
  MONITORS:      "linter_bot passively monitors a code_file"
  CRITIQUES:     "review_comment judges a code_function"
  AUTHORED_BY:   "review_comment was written by a reviewer Actor"
  MUTATES:       "migration modifies a data_structure"
  TRIGGERED_BY:  "migration is triggered by a deploy narrative"
  CONFIGURES:    "config shapes the behavior of an environment Space"
  READ_BY:       "config is consumed by code_files"
  STORED_IN:     "secret lives inside a config file"
  OWNED_BY:      "secret is owned by an Actor (high trust required)"
  CHAIN_NEXT:    "doc chain golden thread — position N → position N+1"
  CLAIMED_BY:    "task is claimed by an Actor"
  SERVES:        "task serves an objective"
  MEASURES:      "metric observes a code_file or module"
  QUANTIFIES:    "metric provides numeric evidence for an invariant"
